<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="base-segments" content="1" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Zenova — One agency for everything modern</title>
    <link rel="icon" type="image/png" href="%BASE_URL%assets/favicon.png" />
    <meta name="description" content="Zenova combines design, development, marketing, and startup support into one seamless partnership for ambitious modern businesses." />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preconnect" href="https://api.fontshare.com" />
    <link rel="preconnect" href="https://cdn.fontshare.com" crossorigin />
    <link
      href="https://api.fontshare.com/v2/css?f[]=clash-display@400,500,600,700&f[]=satoshi@300,400,500,700&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />

    <script>
      // SPA redirect decoder — pairs with public/404.html for GitHub Pages.
      // If we arrived via /?/path encoding, rewrite back to the real path.
      (function (l) {
        if (l.search[1] === '/') {
          var decoded = l.search
            .slice(1)
            .split('&')
            .map(function (s) {
              return s.replace(/~and~/g, '&');
            })
            .join('?');
          window.history.replaceState(null, null, l.pathname.slice(0, -1) + decoded + l.hash);
        }
      })(window.location);
    </script>
    <script>
      document.documentElement.setAttribute('data-theme',
        (function() { try { var t = localStorage.getItem('zenova-theme'); if (t === 'dark' || t === 'light') return t; } catch(e){} return 'dark'; })()
      );
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="./src/main.tsx"></script>
  </body>
</html>
