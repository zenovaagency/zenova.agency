name: Deploy to GitHub Pages

# Works for user/org sites (*.github.io repos) and project repos with or
# without a custom domain. BASE_PATH defaults to "/" (custom domains / user
# sites). For project repos served at https://<owner>.github.io/<repo>/,
# set the BASE_PATH repository variable to "/<repo>/".

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: 'true'
      NODE_OPTIONS: '--trace-deprecation'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run typecheck

      - name: Build
        env:
          BASE_PATH: '/'
        run: npm run build

      - name: Verify build output
        run: |
          test -f dist/index.html
          test -f dist/404.html
          test -f dist/.nojekyll
          # Make sure index.html links to a built bundle, not raw .tsx source
          if grep -q 'src/main\.tsx' dist/index.html; then
            echo "ERROR: dist/index.html still references raw TypeScript source." >&2
            grep -n 'src/main\.tsx' dist/index.html
            exit 1
          fi
          echo "Build looks healthy."

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/

  deploy:
    needs: build
    runs-on: ubuntu-latest
    env:
      ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: 'true'
      NODE_OPTIONS: '--trace-deprecation'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
